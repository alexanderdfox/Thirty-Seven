<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thirty Seven — A Parable</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(180deg, #050508 0%, #0a0a18 50%, #050514 100%);
      color: #e6d9b3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ffd766;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 24px rgba(255, 215, 102, 0.2);
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(230, 217, 179, 0.75);
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a {
      display: block;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: #0a0a10;
      background: linear-gradient(180deg, #ffd766 0%, #e6b84d 100%);
      border: 1px solid rgba(255, 215, 102, 0.4);
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 215, 102, 0.25);
    }

    a:active {
      transform: translateY(0);
    }

    .links a span {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: rgba(10, 10, 16, 0.7);
      margin-top: 0.25rem;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: rgba(230, 217, 179, 0.45);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>THIRTY SEVEN</h1>
    <p class="subtitle">A Parable of Desire, Death,<br>and the Undying Cycle</p>

    <nav class="links">
      <a href="games/web/index.html">
        Top-Down 3D
        <span>Mouse / touch · Pointer movement</span>
      </a>
      <a href="games/web3d/index.html">
        6DOF First-Person
        <span>Descent-style · Rear view mirrors</span>
      </a>
      <a href="games/nes/index.html">
        NES Style
        <span>D-pad · Z/X BREATHE · Chiptune</span>
      </a>
    </nav>

    <p class="footer">The fire never dies.</p>
